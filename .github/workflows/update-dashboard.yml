name: Update Dashboard

on:
  schedule:
    # 毎日 JST 9:00 (UTC 0:00) に実行
    - cron: '0 0 * * *'
  # Organization内の他リポジトリへのpushでもトリガー
  repository_dispatch:
    types: [member-push]
  workflow_dispatch: # 手動実行も可能

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore history data
        run: |
          mkdir -p docs/data-history
          git checkout origin/gh-pages -- data-history/ 2>/dev/null || true
          cp -r data-history/* docs/data-history/ 2>/dev/null || true

      - name: Generate dashboard data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x generate-data.sh
          bash generate-data.sh docs

      - name: Save daily snapshot for trend
        run: |
          mkdir -p docs/data-history
          DATE=$(date -u +%Y-%m-%d)
          cp docs/data.json "docs/data-history/${DATE}.json"
          # 30日分だけ保持
          ls docs/data-history/*.json 2>/dev/null | sort | head -n -30 | xargs rm -f 2>/dev/null || true

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/data-history/
          git diff --staged --quiet || git commit -m "Update dashboard data $(date -u +%Y-%m-%d_%H%M)"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
